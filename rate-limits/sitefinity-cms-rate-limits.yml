specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Sitefinity CMS
providerId: sitefinity-cms
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Content Management
  - DXP
  - Rate Limiting
description: Sitefinity CMS is primarily a self-hosted (or Sitefinity Cloud-hosted) .NET CMS where
  request-rate behavior depends on customer infrastructure rather than a vendor-imposed cap. Progress
  does not publish a public rate-limits document for the Sitefinity Web Services API.
sources:
  - https://www.progress.com/sitefinity
notes: |
  Sitefinity is customer-deployed (or hosted in Sitefinity Cloud). Throughput limits are governed by
  the customer's IIS / Sitefinity Cloud configuration rather than a Progress-published rate cap.
responseCodes: {}
limits:
  - name: Self-Hosted / Sitefinity Cloud Throughput
    scope: tenant
    metric: varies
    limit: 'governed by customer IIS / Sitefinity Cloud configuration'
    notes: No Progress-published numeric rate cap; throughput is constrained by deployment topology.
policies:
  - name: Customer-Managed Throttling
    description: Because Sitefinity is customer-deployed, request throttling and capacity planning
      are the responsibility of the customer or the Sitefinity Cloud-managed deployment.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
