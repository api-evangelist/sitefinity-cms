specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Sitefinity CMS
providerId: sitefinity-cms
publisherName: Progress Software Corporation
serviceCategory: Digital Experience Platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Content Management
  - DXP
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps placeholder for Progress Sitefinity CMS: contact-sales licensing
  with no public unit prices; Progress invoices the annual license plus optional cloud / add-on lines.'
sources:
  - https://www.progress.com/sitefinity
notes: |
  Progress does not publish public Sitefinity prices; meters below describe the typical invoice-line
  shape (license, cloud capacity, add-ons) but unit prices are set per signed agreement.
billingModel:
  pricingCategory: Contact Sales
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Sitefinity CMS
  ServiceCategory: Digital Experience Platform
  ProviderName: Progress
  PublisherName: Progress Software Corporation
  InvoiceIssuerName: Progress Software Corporation
  BillingCurrency: USD
meters:
  - name: license_subscription
    description: Annual Sitefinity edition license fee (Standard / Professional / Enterprise).
    unit: varies
    aggregation: sum
    dimensions:
      - edition
  - name: sitefinity_cloud_capacity
    description: Sitefinity Cloud-managed deployment capacity charge.
    unit: varies
    aggregation: max
    dimensions:
      - environment
      - region
  - name: addon_subscription
    description: Add-on subscriptions (Sitefinity Insight, Commerce) negotiated alongside the core
      license.
    unit: varies
    aggregation: sum
    dimensions:
      - addon
principles:
  - name: Visibility
    description: Track environment counts, hosted-cloud capacity, and add-on activation against the
      signed Progress agreement; no consumption-API export is offered.
  - name: Allocation
    description: Allocate per brand or per digital property by mapping each Sitefinity site to its
      consuming business unit on the signed order form.
  - name: Optimization
    description: Renewal is the optimization lever — reconcile actual environment counts and add-on
      usage before the annual renewal to negotiate scope.
  - name: Accountability
    description: CMS platform owner reconciles the annual invoice against actual deployed sites,
      environments, and add-ons.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
