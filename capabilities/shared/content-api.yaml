naftiko: "1.0.0-alpha1"

info:
  label: "Sitefinity CMS Content API"
  description: >-
    REST API for managing Sitefinity CMS content items across all content types
    including news items, blog posts, events, and custom types. Uses OData query
    conventions and ASP.NET cookie-based authentication.
  tags:
    - Sitefinity
    - Content Management
    - Headless CMS
    - REST
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SITEFINITY_AUTH_COOKIE: SITEFINITY_AUTH_COOKIE
      SITEFINITY_BASE_URL: SITEFINITY_BASE_URL

capability:
  consumes:
    - type: http
      namespace: sitefinity-content
      baseUri: "{{SITEFINITY_BASE_URL}}/api/default"
      description: "Sitefinity CMS Content API for managing content items"
      authentication:
        type: apikey
        key: .ASPXAUTH
        value: "{{SITEFINITY_AUTH_COOKIE}}"
        placement: cookie
      resources:
        - name: news-items
          path: /newsitems
          description: "Manage news content items"
          operations:
            - name: list-news-items
              method: GET
              description: "List news items with OData filtering"
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Max items to return"
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
                - name: $orderby
                  in: query
                  type: string
                  required: false
                  description: "OData orderby clause"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-news-item
              method: POST
              description: "Create a new news item"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  Title: "{{tools.title}}"
                  Content: "{{tools.content}}"
                  Summary: "{{tools.summary}}"

        - name: blog-posts
          path: /blogposts
          description: "Manage blog post content items"
          operations:
            - name: list-blog-posts
              method: GET
              description: "List blog posts with OData filtering"
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Max items to return"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-blog-post
              method: POST
              description: "Create a new blog post"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  Title: "{{tools.title}}"
                  Content: "{{tools.content}}"

        - name: events
          path: /events
          description: "Manage event content items"
          operations:
            - name: list-events
              method: GET
              description: "List events with OData filtering"
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Max items to return"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-event
              method: POST
              description: "Create a new event"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  Title: "{{tools.title}}"
                  Content: "{{tools.content}}"

  exposes:
    - type: rest
      port: 8100
      namespace: sitefinity-content-rest-api
      resources:
        - path: /v1/news-items
          name: news-items
          operations:
            - method: GET
              name: list-news-items
              call: "sitefinity-content.list-news-items"
            - method: POST
              name: create-news-item
              call: "sitefinity-content.create-news-item"

    - type: mcp
      port: 9100
      namespace: sitefinity-content-mcp
      transport: http
      tools:
        - name: list-news-items
          description: "List Sitefinity CMS news items"
          hints:
            readOnly: true
          call: "sitefinity-content.list-news-items"
        - name: create-news-item
          description: "Create a new news item in Sitefinity CMS"
          call: "sitefinity-content.create-news-item"
        - name: list-blog-posts
          description: "List Sitefinity CMS blog posts"
          hints:
            readOnly: true
          call: "sitefinity-content.list-blog-posts"
        - name: list-events
          description: "List Sitefinity CMS events"
          hints:
            readOnly: true
          call: "sitefinity-content.list-events"
