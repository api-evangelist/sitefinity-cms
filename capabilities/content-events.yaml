naftiko: 1.0.0-alpha2
info:
  label: Sitefinity CMS Content API — Events
  description: 'Sitefinity CMS Content API — Events. 2 operations. Lead operation: List Events. Self-contained Naftiko capability
    covering one Sitefinity Cms business surface.'
  tags:
  - Sitefinity Cms
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SITEFINITY_CMS_API_KEY: SITEFINITY_CMS_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-events
    baseUri: https://{site}.sitefinity.com/api/default
    description: Sitefinity CMS Content API — Events business capability. Self-contained, no shared references.
    resources:
    - name: events
      path: /events
      operations:
      - name: listevents
        method: GET
        description: List Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createevent
        method: POST
        description: Create Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: .ASPXAUTH
      value: '{{env.SITEFINITY_CMS_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: content-events-rest
    port: 8080
    description: REST adapter for Sitefinity CMS Content API — Events. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/events
      name: events
      description: REST surface for events.
      operations:
      - method: GET
        name: listevents
        description: List Events
        call: content-events.listevents
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createevent
        description: Create Event
        call: content-events.createevent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sitefinity CMS Content API — Events. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-events
      description: List Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-events.listevents
      outputParameters:
      - type: object
        mapping: $.
    - name: create-event
      description: Create Event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: content-events.createevent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
