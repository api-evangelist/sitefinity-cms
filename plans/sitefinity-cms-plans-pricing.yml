specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Sitefinity CMS
providerId: sitefinity-cms
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Content Management
  - DXP
  - .NET
  - Web Content Management
description: Progress Sitefinity CMS does not publish public pricing on its product or pricing pages.
  Quotes are issued via Progress sales after a discovery call. This artifact carries a single
  contact-sales placeholder.
sources:
  - https://www.progress.com/sitefinity
notes: |
  The /sitefinity/pricing path on progress.com routes to a Microsoft authentication flow rather than
  a public price list. Tier names (Standard / Professional / Enterprise / Cloud) appear in marketing
  collateral but are not associated with public unit prices.
plans:
  - id: sitefinity-cms-contact-sales
    name: Contact Sales
    type: enterprise
    description: All Sitefinity CMS editions (Standard, Professional, Enterprise, Cloud) are licensed
      via Progress sales with custom pricing per environment count and feature set.
    entries:
      - label: Custom Negotiated Pricing
        name: custom_pricing
        type: flat
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: 'contact sales'
        userMultiplied: false
    elements:
      - name: Sitefinity CMS License
      - name: Sitefinity Cloud (Managed)
      - name: Sitefinity Insight (Add-on)
      - name: Sitefinity Commerce (Add-on)
      - name: Progress Support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
